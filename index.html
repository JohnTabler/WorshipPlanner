<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worship Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Login view -->
  <div id="login-view" class="view">
    <form id="login-form">
      <h1>Worship Planner</h1>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Log In</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <!-- App view (placeholder shell — songs, musicians, calendar, etc. go here next) -->
  <div id="app-view" class="view hidden">
    <header>
      <h1>Worship Planner</h1>
      <button id="logout-btn">Log Out</button>
    </header>
    <main>
      <p>You're logged in. Songs, musicians, calendar, and order-of-service tools go here next.</p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
