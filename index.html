<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worship Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Login view -->
  <div id="login-view" class="view">
    <form id="login-form">
      <h1>Worship Planner</h1>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Log In</button>
      <p id="login-error" class="error"></p>
    </form>
  </div>

  <!-- App view (placeholder shell — songs, musicians, calendar, etc. go here next) -->
  <div id="app-view" class="view hidden">
    <header>
      <h1>Worship Planner</h1>
      <button id="logout-btn">Log Out</button>
    </header>
    <main>
      <section id="songs-section">
        <h2>Songs</h2>

        <form id="song-form">
          <input type="hidden" id="song-id">
          <input type="text" id="song-title" placeholder="Title" required>
          <input type="text" id="song-artist" placeholder="Artist">
          <input type="text" id="song-key" placeholder="Key (e.g. G)">
          <input type="number" id="song-bpm" placeholder="BPM">
          <input type="url" id="song-youtube" placeholder="YouTube link">
          <input type="url" id="song-chart" placeholder="Chord chart link">
          <input type="text" id="song-tags" placeholder="Tags (comma separated)">
          <input type="date" id="song-last-played">
          <textarea id="song-notes" placeholder="Notes"></textarea>
          <div class="form-actions">
            <button type="submit" id="song-submit-btn">Add Song</button>
            <button type="button" id="song-cancel-btn" class="hidden">Cancel</button>
          </div>
          <p id="song-error" class="error"></p>
        </form>

        <input type="text" id="song-search" placeholder="Search songs...">

        <table id="songs-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Artist</th>
              <th>Key</th>
              <th>BPM</th>
              <th>Links</th>
              <th>Tags</th>
              <th>Last Played</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="songs-tbody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/songs.js"></script>
</body>
</html>
